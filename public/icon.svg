<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Outer Neobrutalist Container with Rounded Corner & Black Border -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="#D6F554" stroke="#000000" stroke-width="20" />

  <!-- Hard Shadow behind Gauge Container -->
  <rect x="82" y="82" width="364" height="364" rx="60" fill="#000000" />
  <!-- Inner Gauge Container Card -->
  <rect x="72" y="72" width="364" height="364" rx="60" fill="#18181B" stroke="#000000" stroke-width="12" />

  <!-- Speedometer Arch Scale -->
  <path d="M 136 308 A 132 132 0 1 1 376 308" fill="none" stroke="#27272A" stroke-width="28" stroke-linecap="round" />
  <path d="M 136 308 A 132 132 0 1 1 376 308" fill="none" stroke="#FF6B35" stroke-width="12" stroke-dasharray="16 12" stroke-linecap="round" />
  <path d="M 136 308 A 132 132 0 0 1 348 180" fill="none" stroke="#D6F554" stroke-width="14" stroke-linecap="round" />

  <!-- Speedometer Needle (pointing up-right to speed) -->
  <polygon points="256,252 344,152 268,268" fill="#FF3366" stroke="#000000" stroke-width="6" stroke-linejoin="round" />
  
  <!-- Gauge Center Pivot -->
  <circle cx="256" cy="268" r="26" fill="#FF6B35" stroke="#000000" stroke-width="8" />
  <circle cx="256" cy="268" r="10" fill="#FFFFFF" />

  <!-- Digital Odometer Box -->
  <g transform="translate(144, 324)">
    <!-- Odometer Shadow -->
    <rect x="6" y="6" width="224" height="64" rx="14" fill="#000000" />
    <!-- Odometer Frame -->
    <rect x="0" y="0" width="224" height="64" rx="14" fill="#27272A" stroke="#000000" stroke-width="6" />
    <!-- Digit Slots -->
    <rect x="12" y="10" width="30" height="44" rx="4" fill="#09090B" stroke="#3F3F46" stroke-width="2" />
    <rect x="46" y="10" width="30" height="44" rx="4" fill="#09090B" stroke="#3F3F46" stroke-width="2" />
    <rect x="80" y="10" width="30" height="44" rx="4" fill="#09090B" stroke="#3F3F46" stroke-width="2" />
    <rect x="114" y="10" width="30" height="44" rx="4" fill="#09090B" stroke="#3F3F46" stroke-width="2" />
    <rect x="148" y="10" width="30" height="44" rx="4" fill="#09090B" stroke="#3F3F46" stroke-width="2" />
    <rect x="182" y="10" width="30" height="44" rx="4" fill="#FF6B35" stroke="#000000" stroke-width="2" />
    
    <!-- Odometer Digits -->
    <text x="27" y="42" font-family="'Courier New', Courier, monospace" font-size="28" font-weight="900" text-anchor="middle" fill="#FFFFFF">0</text>
    <text x="61" y="42" font-family="'Courier New', Courier, monospace" font-size="28" font-weight="900" text-anchor="middle" fill="#FFFFFF">4</text>
    <text x="95" y="42" font-family="'Courier New', Courier, monospace" font-size="28" font-weight="900" text-anchor="middle" fill="#FFFFFF">8</text>
    <text x="129" y="42" font-family="'Courier New', Courier, monospace" font-size="28" font-weight="900" text-anchor="middle" fill="#FFFFFF">2</text>
    <text x="163" y="42" font-family="'Courier New', Courier, monospace" font-size="28" font-weight="900" text-anchor="middle" fill="#FFFFFF">9</text>
    <text x="197" y="42" font-family="'Courier New', Courier, monospace" font-size="28" font-weight="900" text-anchor="middle" fill="#000000">5</text>
  </g>

  <!-- Top Vehicle Silhouette Accent Badge -->
  <g transform="translate(192, 110)">
    <!-- Badge Shadow -->
    <rect x="4" y="4" width="128" height="46" rx="23" fill="#000000" />
    <!-- Badge Body -->
    <rect x="0" y="0" width="128" height="46" rx="23" fill="#D6F554" stroke="#000000" stroke-width="6" />
    <!-- Car Icon SVG Path -->
    <path d="M 34 30 L 38 18 C 40 14 45 12 51 12 L 77 12 C 83 12 88 14 90 18 L 94 30 Z M 26 30 L 102 30 C 106 30 108 32 108 36 L 108 38 C 108 41 106 43 102 43 L 26 43 C 22 43 20 41 20 38 L 20 36 C 20 32 22 30 26 30 Z" fill="#000000" />
    <circle cx="38" cy="38" r="5" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
    <circle cx="90" cy="38" r="5" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
  </g>
</svg>
